<!DOCTYPE html>
<html lang="en">
<head>
   <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- font awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!-- tailwind and daisyUI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="style.css">
<!-- font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm">
        
        <div class="w-[100px] h-[100px]  ">
        <img src="assets/github-logo.png"  alt="">
        </div>
  <div class="flex-1">
    <a class="btn btn-ghost text-xl">Github Issue Tracker</a>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
    
        
       <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
      
      
    </div>
</div>
<div class="select-button flex justify-start gap-3 mt-15 mx-auto w-full lg:w-4/5 shadow-sm p-8 bg-base-100 rounded-lg">
    <button class="btn all-btn btn-outline text-[gray] w-[100px]">All</button>
    <button class="btn open-btn btn-outline text-[gray] w-[100px]">Open</button>
    <button class="btn closed-btn btn-outline text-[gray] w-[100px]">Closed</button>

</div>

</body>
</html>
